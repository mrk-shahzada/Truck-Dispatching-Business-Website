<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProDispatch | Get Quote</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="noise"></div>
    <div class="cursor"></div>
    <div class="cursor-follower"></div>
    <div class="bg-grid-container"><div class="bg-grid"></div></div>

    <nav class="navbar">
        <div class="logo">PRO<span>DISPATCH</span></div>
        <div class="nav-links">
            <a href="index.html" class="hover-target">Home</a>
            <a href="services.html" class="hover-target">Services</a>
            <a href="pricing.html" class="hover-target">Pricing</a>
            <a href="contact.html" class="btn hover-target">Get Quote</a>
        </div>
    </nav>

    <main id="smooth-wrapper">
        <div id="smooth-content">
            
            <header class="page-hero">
                <h1 class="page-title">
                    <span class="line">INITIATE</span>
                    <span class="line highlight">CONTACT</span>
                </h1>
            </header>

            <section class="contact-section">
                <div class="contact-info scroll-anim">
                    <h2 style="font-family: 'Syncopate'; font-size: 2rem; margin-bottom: 2rem;">LET'S ROLL.</h2>
                    <p style="color: #aaa; font-size: 1.2rem; line-height: 1.6; margin-bottom: 2rem;">
                        Fill out the form with your equipment details. Our dispatchers will analyze your lanes and contact you within 30 minutes with a customized revenue strategy.
                    </p>
                    <p style="font-family: 'Syncopate'; color: var(--accent);">EMAIL: DISPATCH@PRODISPATCH.COM</p>
                    <p style="font-family: 'Syncopate'; color: var(--accent); margin-top: 1rem;">PHONE: (800) 555-0199</p>
                </div>

                <div class="contact-form scroll-anim">
                    <form action="#" method="POST">
                        <div class="form-group">
                            <label>Name / Company</label>
                            <input type="text" class="form-input hover-target" placeholder="John Doe Transport">
                        </div>
                        <div class="form-group">
                            <label>Phone Number</label>
                            <input type="tel" class="form-input hover-target" placeholder="(555) 000-0000">
                        </div>
                        <div class="form-group">
                            <label>Equipment Type</label>
                            <!-- Using input instead of standard select to keep the high-end UI feel -->
                            <input type="text" class="form-input hover-target" placeholder="Dry Van / Reefer / Flatbed">
                        </div>
                        <div class="form-group">
                            <label>MC Number</label>
                            <input type="text" class="form-input hover-target" placeholder="1234567">
                        </div>
                        <button type="submit" class="primary-btn submit-btn hover-target">Send Request</button>
                    </form>
                </div>
            </section>

        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.19/bundled/lenis.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
